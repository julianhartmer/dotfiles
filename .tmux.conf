# .tmux.conf

# Use Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Enable mouse support
set -g mouse on

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Dracula Theme Colors
# background: #282a36
# foreground: #f8f8f2
# selection: #44475a
# comment: #6272a4
# cyan: #8be9fd
# green: #50fa7b
# orange: #ffb86c
# pink: #ff79c6
# purple: #bd93f9
# red: #ff5555
# yellow: #f1fa8c

# Status bar colors
set -g status-style bg='#282a36',fg='#f8f8f2'

# Status bar layout
set -g status-left-length 30
set -g status-left "#[bg=#bd93f9,fg=#282a36] #S #[bg=#44475a,fg=#f8f8f2] "

set -g status-right-length 150
set -g status-right "#[bg=#44475a,fg=#f8f8f2] %H:%M #[bg=#bd93f9,fg=#282a36] %d-%b-%y "

# Window status format
set -g window-status-format "#[fg=#f8f8f2,bg=#44475a] #I:#W "
set -g window-status-current-format "#[fg=#282a36,bg=#bd93f9] #I:#W "

# Pane border colors
set -g pane-border-style fg='#44475a'
set -g pane-active-border-style fg='#bd93f9'

# Message colors
set -g message-style bg='#44475a',fg='#8be9fd'

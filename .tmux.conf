# .tmux.conf

# Use Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use Vim-style pane resizing (capital letters)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Custom pane management
# v - Split pane vertically (side-by-side)
# x - Split pane horizontally (top-to-bottom)
# q - Close current pane
# ! - Break pane into a new window
# @ - Join a window into the current pane (interactive)
# S - Swap current pane with previous pane (keeps layout)
bind-key v split-window -h -c "#{pane_current_path}"
bind-key x split-window -v -c "#{pane_current_path}"
bind-key q confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind-key ! break-pane -d
bind-key @ choose-window 'join-pane -h -s "%%"'
bind-key S swap-pane -U

# Enable mouse support
set -g mouse on

# Increase repeat-time for easier repeated resizing
set -g repeat-time 1000

# Use Vim-style keys in copy mode
setw -g mode-keys vi

# Update mouse selection to copy to system clipboard (macOS)
# This allows you to select text with the mouse and have it immediately available to paste elsewhere.
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Dracula Theme Colors
# background: #282a36
# foreground: #f8f8f2
# selection: #44475a
# comment: #6272a4
# cyan: #8be9fd
# green: #50fa7b
# orange: #ffb86c
# pink: #ff79c6
# purple: #bd93f9
# red: #ff5555
# yellow: #f1fa8c

# Status bar colors
set -g status-style bg='#282a36',fg='#f8f8f2'

# Status bar layout
set -g status-left-length 30
set -g status-left "#[bg=#bd93f9,fg=#282a36] #S #[bg=#44475a,fg=#f8f8f2] "

set -g status-right-length 150
set -g status-right "#[bg=#44475a,fg=#f8f8f2] %H:%M #[bg=#bd93f9,fg=#282a36] %d-%b-%y "

# Window status format
set -g window-status-format "#[fg=#f8f8f2,bg=#44475a] #I:#W "
set -g window-status-current-format "#[fg=#282a36,bg=#bd93f9] #I:#W "

# Pane border colors
set -g pane-border-style fg='#44475a'
set -g pane-active-border-style fg='#bd93f9'

# Message colors
set -g message-style bg='#44475a',fg='#8be9fd'

# full color support
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Background opacity (0.0 to 1.0)
# 0.8 is usually a good sweet spot for blur
background_opacity 0.8

# Standard font setting
font_family Source Code Pro
font_size 12.0

# Performance
input_delay 0
repaint_delay 2
sync_to_monitor yes

# Window control position
# On GNOME/Wayland, kitty uses Client Side Decorations (CSD) which don't 
# respect the system button layout. Forcing x11 (XWayland) allows the 
# window manager to handle decorations and move buttons to the left.
linux_display_server x11

# The install.sh script sets the system-wide button layout via gsettings:
# gsettings set org.gnome.desktop.wm.preferences button-layout 'close,maximize,minimize:'
